# Homepage (gethomepage.dev) Custom API Widget Configuration for smtp2mqtt
# 
# Add this configuration to your homepage `widgets.yaml` or `services.yaml` file.
# Make sure to replace `http://localhost:8080` with the actual address of your smtp2mqtt container.

- customapi:
    name: smtp2mqtt Gateway
    icon: mdi-email-sync-outline
    url: http://localhost:8080/api/status
    method: GET
    headers:
      Accept: application/json
    mappings:
      - field: processed_messages_count
        label: Messages
        format: number
      - field: uptime_formatted
        label: Uptime
      - field: smtp_status_text
        label: SMTP
      - field: mqtt_status_text
        label: MQTT

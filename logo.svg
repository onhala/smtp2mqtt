<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Neon Green Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Linear Gradients for Premium Visual Depth -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ce637" />
      <stop offset="100%" stop-color="#5fa115" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e130f" />
      <stop offset="100%" stop-color="#050706" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ec127" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#7ec127" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#7ec127" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#darkGrad)" stroke="#1a261d" stroke-width="4" />
  
  <!-- Subtle tech Gridlines -->
  <line x1="64" y1="0" x2="64" y2="512" stroke="#0e130f" stroke-width="2" />
  <line x1="448" y1="0" x2="448" y2="512" stroke="#0e130f" stroke-width="2" />
  <line x1="0" y1="64" x2="512" y2="64" stroke="#0e130f" stroke-width="2" />
  <line x1="0" y1="448" x2="512" y2="448" stroke="#0e130f" stroke-width="2" />

  <!-- Diagonal Tech Accent Beam -->
  <line x1="0" y1="128" x2="512" y2="384" stroke="url(#accentGrad)" stroke-width="32" stroke-linecap="round" />

  <!-- The Smart Gateway Connector (Central Node Structure) -->
  <g transform="translate(0, 0)">
    <!-- Bridge Arrow / Gateway Lines -->
    <path d="M 180 256 Q 256 210 332 256" fill="none" stroke="url(#greenGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
    <path d="M 180 256 L 332 256" fill="none" stroke="#e2e8f0" stroke-width="4" stroke-dasharray="12 8" stroke-linecap="round" opacity="0.8" />
    
    <!-- Left Component: SMTP Mail/Envelope -->
    <g transform="translate(110, 216)">
      <!-- Outer Hexagon Frame -->
      <polygon points="40,0 80,24 80,72 40,96 0,72 0,24" fill="#0b0f0c" stroke="#1a261d" stroke-width="3" />
      <polygon points="40,0 80,24 80,72 40,96 0,72 0,24" fill="none" stroke="url(#greenGrad)" stroke-width="2" opacity="0.3" />
      
      <!-- Minimalist Mail Icon -->
      <rect x="18" y="30" width="44" height="32" rx="4" fill="none" stroke="#e2e8f0" stroke-width="3" />
      <path d="M 18 34 L 40 50 L 62 34" fill="none" stroke="url(#greenGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Right Component: MQTT Broker Connection Hub -->
    <g transform="translate(322, 216)">
      <!-- Outer Hexagon Frame -->
      <polygon points="40,0 80,24 80,72 40,96 0,72 0,24" fill="#0b0f0c" stroke="#1a261d" stroke-width="3" />
      <polygon points="40,0 80,24 80,72 40,96 0,72 0,24" fill="none" stroke="url(#greenGrad)" stroke-width="2" opacity="0.3" />
      
      <!-- Hub Central Node & Connected Satellites -->
      <!-- Central Node -->
      <circle cx="40" cy="48" r="10" fill="url(#greenGrad)" filter="url(#glow)" />
      <!-- Top Satellite -->
      <circle cx="40" cy="24" r="5" fill="#e2e8f0" />
      <line x1="40" y1="34" x2="40" y2="24" stroke="#e2e8f0" stroke-width="2" />
      <!-- Bottom-Left Satellite -->
      <circle cx="20" cy="60" r="5" fill="#e2e8f0" />
      <line x1="32" y1="54" x2="20" y2="60" stroke="#e2e8f0" stroke-width="2" />
      <!-- Bottom-Right Satellite -->
      <circle cx="60" cy="60" r="5" fill="#e2e8f0" />
      <line x1="48" y1="54" x2="60" y2="60" stroke="#e2e8f0" stroke-width="2" />
    </g>
  </g>

  <!-- Technical Branding Text -->
  <text x="256" y="420" font-family="'Share Tech Mono', monospace" font-size="28" fill="#7ec127" text-anchor="middle" letter-spacing="4" filter="url(#glow)">SMTP2MQTT</text>
  <text x="256" y="445" font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#4e6351" text-anchor="middle" letter-spacing="8">GATEWAY CONTROLLER</text>
</svg>
